<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Torneo</title>
    <!-- Carichiamo la libreria per leggere il CSV -->
    <script src="https://drive.google.com/file/d/1tJD2l8Hy5dCdCZWBUiP0uUqCXUT5v1tP/view?usp=drivesdk"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>🏆 Classifica in Tempo Reale</h1>
    <p>Aggiornamento automatico dai dati del campo</p>

    <div id="tabella-container">Caricamento dati...</div>

    <script>
        // SOSTITUISCI IL LINK QUI SOTTO CON IL TUO LINK CSV DI GOOGLE SHEETS
        const public_spreadsheet_url = 'INCOLLA_QUI_IL_TUO_LINK_CSV';

        function init() {
            Papa.parse(public_spreadsheet_url, {
                download: true,
                header: true,
                complete: function(results) {
                    costruisciTabella(results.data);
                }
            });
        }

        function costruisciTabella(data) {
            let html = '<table><thead><tr>';
            // Crea intestazioni
            Object.keys(data[0]).forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            // Crea righe
            data.forEach(row => {
                html += '<tr>';
                Object.values(row).forEach(val => {
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('tabella-container').innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
